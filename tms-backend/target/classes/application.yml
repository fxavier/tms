spring:
  application:
    name: tms-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tms}
    username: ${DB_USER:tms}
    password: ${DB_PASSWORD:tms}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        default_schema: public
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/tms}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8080/realms/tms/protocol/openid-connect/certs}

  modulith:
    events:
      externalization:
        enabled: false

logging:
  level:
    root: INFO
    pt.company.tms: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

tms:
  integration:
    rh:
      mode: ${RH_INTEGRATION_MODE:rest}
      base-url: ${RH_BASE_URL:}
      api-key: ${RH_API_KEY:}
      connect-timeout-ms: 3000
      read-timeout-ms: 5000
      cache-ttl-minutes: 15
  storage:
    type: ${STORAGE_TYPE:s3}
    bucket: ${STORAGE_BUCKET:tms-files}
    endpoint: ${STORAGE_ENDPOINT:}
    access-key: ${STORAGE_ACCESS_KEY:}
    secret-key: ${STORAGE_SECRET_KEY:}
    max-file-size-mb: 10
  security:
    rate-limit:
      requests-per-minute: 60
  scheduling:
    alert-check-cron: "0 0 6 * * *"
