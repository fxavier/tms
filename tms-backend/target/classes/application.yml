spring:
  application:
    name: tms

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        default_schema: public
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:}

  modulith:
    events:
      externalization:
        enabled: false

logging:
  level:
    root: INFO
    pt.xavier.tms: INFO
  pattern:
    console: '{"timestamp":"%d{yyyy-MM-dd HH:mm:ss.SSS}","level":"%level","logger":"%logger{36}","thread":"%thread","message":"%message","exception":"%exception{short}"}%n'

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

tms:
  integration:
    rh:
      mode: ${RH_INTEGRATION_MODE:rest}
      base-url: ${RH_BASE_URL:}
      api-key: ${RH_API_KEY:}
      connect-timeout-ms: 3000
      read-timeout-ms: 5000
      cache-ttl-minutes: 15
  storage:
    type: ${STORAGE_TYPE:s3}
    bucket: ${STORAGE_BUCKET:tms-files}
    endpoint: ${STORAGE_ENDPOINT:}
    access-key: ${STORAGE_ACCESS_KEY:}
    secret-key: ${STORAGE_SECRET_KEY:}
    max-file-size-mb: 10
  security:
    rate-limit:
      requests-per-minute: 60
  scheduling:
    alert-check-cron: "0 0 6 * * *"
